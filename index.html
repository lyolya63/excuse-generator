<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excuse Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    p.subtitle { color: #666; margin-bottom: 24px; }

    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #555; }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { background: #999; cursor: not-allowed; }

    .results { margin-top: 32px; display: flex; flex-direction: column; gap: 16px; }

    .card {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 20px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .rank { font-weight: 600; font-size: 0.85rem; color: #888; text-transform: uppercase; }
    .badge {
      font-size: 0.85rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .high   { background: #d4f7d4; color: #1a7a1a; }
    .medium { background: #fff3cc; color: #7a5a00; }
    .low    { background: #fde8e8; color: #a00000; }

    .excuse { font-size: 1rem; margin-bottom: 8px; line-height: 1.5; }
    .why { font-size: 0.85rem; color: #888; font-style: italic; }

    .error { color: #c00; margin-top: 16px; font-size: 0.9rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Excuse Generator</h1>
    <p class="subtitle">Describe a situation where you didn't keep a promise. We'll craft your best excuses.</p>

    <textarea id="situation" placeholder="e.g. I promised my manager I'd send a report by Friday and didn't..."></textarea>
    <button id="btn" onclick="generate()">Generate Excuses</button>
    <p id="error" class="error hidden"></p>

    <div id="results" class="results hidden"></div>
  </div>

  <script>
    async function generate() {
      const situation = document.getElementById("situation").value.trim();
      const btn = document.getElementById("btn");
      const error = document.getElementById("error");
      const results = document.getElementById("results");

      error.classList.add("hidden");
      results.classList.add("hidden");

      if (!situation) {
        showError("Please describe your situation first.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Generating...";

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ situation }),
        });
        const data = await res.json();

        if (data.error) { showError(data.error); return; }

        results.innerHTML = data.excuses.map(e => {
          const level = e.reliability >= 7 ? "high" : e.reliability >= 4 ? "medium" : "low";
          const label = e.reliability >= 7 ? "Believable" : e.reliability >= 4 ? "Risky" : "Suspicious";
          return `
            <div class="card">
              <div class="card-header">
                <span class="rank">#${e.rank}</span>
                <span class="badge ${level}">${label} · ${e.reliability}/10</span>
              </div>
              <p class="excuse">${e.excuse}</p>
              <p class="why">${e.why}</p>
            </div>`;
        }).join("");

        results.classList.remove("hidden");
      } catch (err) {
        showError("Something went wrong. Please try again.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Generate Excuses";
      }
    }

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.classList.remove("hidden");
    }
  </script>
</body>
</html>
